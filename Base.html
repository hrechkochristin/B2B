<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Seller Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
     <div id="sidebar"></div>

        <script>
        fetch('sidebar.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('sidebar').innerHTML = data;
        });
        </script>

    <!-- Main Content -->
    <main class="main">

        <header class="header">
            <h1>Seller Account</h1>
        </header>

        <!-- Products -->
        <section class="card">
            <h3>Каталог продукції</h3>
            <p>Редагування: кількість, ціна, склад</p>
        </section>

        <!-- Orders -->
        <section class="card">
            <h3>Замовлення</h3>
            <p>Нові / В процесі / Завершені</p>
        </section>

        <!-- New Offers -->
        <section class="card">
            <h3>Нові пропозиції</h3>
            <p>Підтвердження або відмова</p>
        </section>

        <!-- Map -->
        <section class="card">
            <h3>Мапа</h3>
            <div class="map">[Тут буде карта]</div>
        </section>

        <!-- Warehouses -->
        <section class="card">
            <h3>Склади</h3>
            <p>Редагування розташування та параметрів</p>
        </section>

        <!-- Carriers -->
        <section class="card">
            <h3>Перевізники</h3>
            <p>Угоди, список, статуси</p>
        </section>

        <!-- Chats -->
        <section class="card">
            <h3>Чати</h3>
            <p>Перевізники / Покупці</p>
        </section>

    </main>

</div>

</body>
</html>
