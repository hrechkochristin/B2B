<!-- templates/main/main_base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Мій сайт{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'main/css/buyer.css' %}">

</head>
<body>
    <!-- Header Bar -->
    <header class="top-header">
        <div class="header-left">
            <button class="burger-menu" id="burger-toggle">
                <span class="burger-line"></span>
                <span class="burger-line"></span>
                <span class="burger-line"></span>
            </button>
            <h1 class="page-title">Dashboard</h1>
        </div>
        <div class="header-right">
            <div class="user-info">
                <div class="user-avatar">
                    <img src="https://via.placeholder.com/40x40/38bdf8/ffffff?text=S" alt="Seller Avatar">
                </div>
                <span class="user-name">Продавець</span>
            </div>
        </div>
    </header>
    <div class="layout">
        <aside class="layout-sidebar">
            {% block sidebar %}
            {% endblock %}
        </aside>

        <main class="layout-content">
            {% block content %}
            {% endblock %}
        </main>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
